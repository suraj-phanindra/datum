name: Cloud CI

on:
  push:
    branches: [main]
    paths: ["cloud/**", "server/**", ".github/workflows/cloud.yml"]
  pull_request:
    branches: [main]
    paths: ["cloud/**", "server/**", ".github/workflows/cloud.yml"]

concurrency:
  group: cloud-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud:
    name: cloud
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Durable Object via workers pool)
        run: npm test
