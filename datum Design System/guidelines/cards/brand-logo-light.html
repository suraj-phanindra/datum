<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary);
         font-family:var(--font-sans);
         display:flex; align-items:center; justify-content:center; height:100vh; gap:18px; }
  .mark { width:54px; height:54px; color:var(--text-primary); }
  .word { font-size:46px; font-weight:500; letter-spacing:-0.02em; }
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="12.5" stroke="currentColor" stroke-width="2"/>
    <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="24" y1="5" x2="24" y2="20.4"/><line x1="24" y1="27.6" x2="24" y2="43"/>
      <line x1="5" y1="24" x2="20.4" y2="24"/><line x1="27.6" y1="24" x2="43" y2="24"/>
    </g>
    <circle cx="24" cy="24" r="2.6" fill="#F5A623"/>
  </svg>
  <span class="word">datum</span>
</body>
</html>
