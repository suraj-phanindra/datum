<!-- @dsCard group="Type" viewport="700x190" name="Pixel display (marketing)" subtitle="Geist Pixel Square · hero headlines only — never UI chrome or identifiers" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary);
         font-family:var(--font-sans); padding:24px 26px; }
  .spec { font-family:var(--font-pixel); font-size:40px; line-height:1.05; margin:0 0 14px; }
  .spec .a { color:var(--signal-amber); }
  .rules { display:flex; gap:22px; font-size:11.5px; color:var(--text-tertiary); }
  .rules span b { color:var(--text-secondary); font-weight:500; }
  .rules .mk { font-family:var(--font-mono); font-size:10.5px; margin-right:5px; }
  .ok .mk { color:var(--signal-green); } .no .mk { color:var(--signal-red); }
</style>
</head>
<body>
  <p class="spec">agents in motion<span class="a">_</span></p>
  <div class="rules">
    <span class="ok"><span class="mk">do</span><b>marketing hero, TV-mode title, swag</b></span>
    <span class="no"><span class="mk">no</span><b>product UI chrome</b></span>
    <span class="no"><span class="mk">no</span><b>identifiers — those stay Geist Mono</b></span>
  </div>
</body>
</html>
