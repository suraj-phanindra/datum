<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary);
         font-family:var(--font-sans); padding:24px 26px;
         display:flex; gap:34px; align-items:flex-end; flex-wrap:wrap; }
  .w { display:flex; flex-direction:column; gap:6px; }
  .w b { font-size:30px; line-height:1; letter-spacing:-0.01em; }
  .w span { font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); }
  .r { font-weight:400; } .m { font-weight:500; } .s { font-weight:600; } .x { font-weight:700; }
</style>
</head>
<body>
  <div class="w"><b class="r">datum</b><span>400 · regular</span></div>
  <div class="w"><b class="m">datum</b><span>500 · medium</span></div>
  <div class="w"><b class="s">datum</b><span>600 · semibold</span></div>
  <div class="w"><b class="x">datum</b><span>700 · bold</span></div>
</body>
</html>
