<!-- @dsCard group="Type" viewport="700x200" name="Display & headings" subtitle="Geist · tight tracking for marketing & TV mode" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary);
         font-family:var(--font-sans); padding:22px 26px; }
  .row { display:flex; align-items:baseline; gap:16px; border-bottom:var(--border); padding:9px 0; }
  .row:last-child { border-bottom:0; }
  .spec { font-size:var(--text-display); font-weight:600; letter-spacing:var(--tracking-display); line-height:1; }
  .h1 { font-size:var(--text-h1); font-weight:600; letter-spacing:var(--tracking-tight); line-height:1; }
  .h2 { font-size:var(--text-h2); font-weight:500; letter-spacing:var(--tracking-tight); line-height:1; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-left:auto; }
</style>
</head>
<body>
  <div class="row"><span class="spec">coordinates agents in motion</span><span class="meta">44 / 600</span></div>
  <div class="row"><span class="h1">contract delta · db.users</span><span class="meta">28 / 600</span></div>
  <div class="row"><span class="h2">current truth</span><span class="meta">22 / 500</span></div>
</body>
</html>
