<!-- @dsCard group="Components" viewport="700x640" name="Live drift card (animated)" subtitle="Event-driven state machine · epoch tick → fence → reconcile → patch" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-base); color:var(--text-primary);
         font-family:var(--font-sans); padding:20px 24px; }
  .ctrl { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .btn { height:30px; padding:0 13px; border-radius:var(--radius-sm); cursor:pointer;
         font-family:var(--font-sans); font-size:13px; font-weight:500;
         background:var(--text-primary); color:var(--bg-base); border:1px solid var(--text-primary); }
  .btn--ghost { background:transparent; color:var(--text-secondary); border-color:var(--border-strong); }
  .stage { margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); }
  .stage b { color:var(--signal-amber); }
  .epoch-wrap { display:flex; align-items:center; gap:14px; padding:11px 14px; margin-bottom:14px;
                border:1px solid var(--border-hairline); border-radius:var(--radius-md); background:var(--bg-inset); }
  .note { margin-top:14px; font-family:var(--font-mono); font-size:10.5px; color:var(--text-tertiary); line-height:1.6; }
  .note b { color:var(--text-secondary); font-weight:500; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { LiveDriftCard, EpochStrip } = window.DatumDesignSystem_b409bf;

    function Demo(){
      const ref = React.useRef(null);
      const [stage, setStage] = React.useState("calm");
      const [tickKey, setTickKey] = React.useState(0);
      const ticked = stage !== "calm";

      const epoch = [
        { v:"v5", time:"11:20", state:"past" },
        { v:"v6", time:"12:08", state:"past" },
        { v:"v7", time:"12:55", state: ticked ? "past" : "live" },
      ];
      if (ticked) epoch.push({ v:"v8", time:"14:02", state:"live" });

      const fire = () => { setTickKey(k=>k+1); ref.current && ref.current.fire(); };
      const reset = () => { ref.current && ref.current.reset(); };

      return (
        <React.Fragment>
          <div className="ctrl">
            <button className="btn" onClick={fire}>fire delta</button>
            <button className="btn btn--ghost" onClick={reset}>reset</button>
            <span className="stage">stage · <b>{stage}</b></span>
          </div>

          <div className="epoch-wrap">
            <span className="eyebrow">epoch</span>
            <EpochStrip key={tickKey} versions={epoch} showTimes animateLive={ticked} />
            <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:11,
              color: ticked ? 'var(--signal-amber)' : 'var(--text-tertiary)'}}>
              live · {ticked ? 'v8' : 'v7'}
            </span>
          </div>

          <LiveDriftCard ref={ref} autoPlay onStageChange={setStage} />

          <p className="note">
            <b>one render path, two event sources.</b> the scripted emitter fires the same transitions a live bus would
            (detected → fenced → advised → reconciling 0/2·1/2 → reconciled 2/2 → spec PR). elapsed labels stay the real
            numbers — only wall-clock pacing is compressed. honors prefers-reduced-motion.
          </p>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
